<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Animated Header</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <header class="header-container">
        <nav class="navbar">
            <div class="logo animate-fade-in">DevStudio</div>
            <ul class="nav-links">
                <li class="animate-fade-in"><a href="#">Work</a></li>
                <li class="animate-fade-in"><a href="#">Services</a></li>
                <li class="animate-fade-in"><a href="#">About</a></li>
                <li class="animate-fade-in"><a href="#">Contact</a></li>
            </ul>
        </nav>

        <div class="hero-content">
            <h1 class="animate-slide-up">Designing the Future</h1>
            <p class="animate-slide-up">We build high-performance digital products with seamless animations.</p>
            <button class="cta-button animate-slide-up">Start a Project</button>
        </div>
    </header>

    <script src="script.js"></script>
</body>

</html>
